name: windows-segfault-diagnose

on:
  workflow_dispatch:
    inputs:
      ucrt_def:
        description: "Use UCRT-generated msvcrt.def (1=yes, 0=no)"
        required: true
        default: "1"

permissions: read-all

jobs:
  windows-manual-smoke:
    runs-on: windows-latest
    env:
      RTINYCC_WIN_UCRT_DEF: ${{ github.event.inputs.ucrt_def }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          R CMD INSTALL --preclean --no-multiarch .

      - name: Manual smoke check
        shell: bash
        run: |
          set -euo pipefail
          R CMD build .
          TAR_GZ="$(ls -1t *.tar.gz | head -n 1)"
          R CMD check --no-manual "$TAR_GZ"
