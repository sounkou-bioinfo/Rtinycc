name: windows-segfault-diagnose

on:
  workflow_dispatch:

permissions: read-all

jobs:
  windows-manual-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          R CMD INSTALL --preclean --no-multiarch .

      - name: Manual smoke check
        shell: bash
        run: |
          set -euo pipefail
          R CMD build .
          TAR_GZ="$(ls -1t *.tar.gz | head -n 1)"
          R CMD check --no-manual "$TAR_GZ"
