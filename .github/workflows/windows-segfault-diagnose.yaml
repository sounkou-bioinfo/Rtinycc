name: windows-segfault-diagnose

on:
  push:
    branches: [windows_segfault]
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  tinycc-c-lifecycle:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        cross_free: [0, 1]

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install gdb (Rtools UCRT)
        shell: bash
        run: |
          set -euo pipefail
          if command -v gdb >/dev/null 2>&1; then
            gdb --version | head -n 1
          else
            /c/rtools45/usr/bin/pacman -Sy --noconfirm --needed mingw-w64-ucrt-x86_64-gdb
            echo 'C:/rtools45/ucrt64/bin' >> "$GITHUB_PATH"
            export PATH="/c/rtools45/ucrt64/bin:$PATH"
            gdb --version | head -n 1
          fi

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          extra-packages: any::lambda.r

      - name: Ensure lambda.r is installed
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e "if (!requireNamespace('lambda.r', quietly = TRUE)) install.packages('lambda.r', repos = 'https://cloud.r-project.org')"

      - name: Install package (build TinyCC assets)
        shell: bash
        run: |
          set -euo pipefail
          R CMD INSTALL --preclean --no-multiarch .

      - name: Discover installed paths
        shell: bash
        run: |
          set -euo pipefail
          PKGROOT="$(Rscript -e 'cat(normalizePath(system.file(package = "Rtinycc"), winslash = "/", mustWork = TRUE))')"
          echo "PKGROOT=$PKGROOT" >> "$GITHUB_ENV"
          echo "PKGROOT=$PKGROOT"
          ls -la "$PKGROOT"
          ls -la "$PKGROOT/tinycc"

      - name: Build TinyCC lifecycle harness
        shell: bash
        run: |
          set -euo pipefail
          CC="$(R CMD config CC)"
          CC="${CC%% *}"
          "$CC" -O0 -g -Wall -Wextra \
            -I"$PKGROOT/tinycc/libtcc" \
            "$GITHUB_WORKSPACE/tools/windows_tcc_lifecycle_stress.c" \
            -L"$PKGROOT/tinycc/lib" -ltcc \
            -o "$RUNNER_TEMP/windows_tcc_lifecycle_stress.exe"

      - name: Enable local crash dumps (WER)
        shell: pwsh
        run: |
          $dumpDir = Join-Path $env:RUNNER_TEMP "dumps"
          New-Item -Path $dumpDir -ItemType Directory -Force | Out-Null
          New-Item -Path "HKCU:\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps" -Force | Out-Null
          New-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps" -Name "DumpFolder" -Value $dumpDir -PropertyType ExpandString -Force | Out-Null
          New-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps" -Name "DumpType" -Value 2 -PropertyType DWord -Force | Out-Null
          Write-Host "WER dump folder: $dumpDir"

      - name: Run harness directly
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$PKGROOT/tinycc:$PKGROOT/tinycc/lib:$PKGROOT/libs/x64:$PATH"
          "$RUNNER_TEMP/windows_tcc_lifecycle_stress.exe" \
            "$PKGROOT/tinycc" "$PKGROOT/tinycc/include" 2000 "${{ matrix.cross_free }}" \
            2>&1 | tee "$RUNNER_TEMP/harness-direct-crossfree-${{ matrix.cross_free }}.log"

      - name: Run harness under gdb (if available)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$PKGROOT/tinycc:$PKGROOT/tinycc/lib:$PKGROOT/libs/x64:$PATH"
          if command -v gdb >/dev/null 2>&1; then
            gdb --batch \
              -x "$GITHUB_WORKSPACE/scripts/windows_gdb_bt.txt" \
              --args "$RUNNER_TEMP/windows_tcc_lifecycle_stress.exe" \
                "$PKGROOT/tinycc" "$PKGROOT/tinycc/include" 2000 "${{ matrix.cross_free }}" \
              > "$RUNNER_TEMP/harness-gdb-crossfree-${{ matrix.cross_free }}.log" 2>&1 || true
          else
            echo "gdb not found on PATH" > "$RUNNER_TEMP/harness-gdb-crossfree-${{ matrix.cross_free }}.log"
          fi

      - name: Collect diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}"
          cp -f "$RUNNER_TEMP"/harness-*.log "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}" 2>/dev/null || true
          cp -f "$RUNNER_TEMP"/dumps/*.dmp "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}" 2>/dev/null || true
          git -C "$GITHUB_WORKSPACE" rev-parse HEAD > "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/git-head.txt" 2>/dev/null || true
          (cd "$GITHUB_WORKSPACE" && find . -maxdepth 3 | sort) > "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/workspace-tree.txt" 2>/dev/null || true
          mkdir -p "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/workspace"
          cp -f "$GITHUB_WORKSPACE"/DESCRIPTION "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/workspace/" 2>/dev/null || true
          cp -f "$GITHUB_WORKSPACE"/configure.win "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/workspace/" 2>/dev/null || true
          cp -f "$GITHUB_WORKSPACE"/src/Makevars.win "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/workspace/" 2>/dev/null || true
          cp -f "$GITHUB_WORKSPACE"/src/install.libs.R "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/workspace/" 2>/dev/null || true
          cp -f "$GITHUB_WORKSPACE"/tools/windows_tcc_lifecycle_stress.c "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/workspace/" 2>/dev/null || true
          cp -f "$GITHUB_WORKSPACE"/.github/workflows/windows-segfault-diagnose.yaml "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/workspace/" 2>/dev/null || true
          Rscript -e "sessionInfo()" > "$RUNNER_TEMP/artifacts-c-${{ matrix.cross_free }}/sessionInfo.txt" 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-c-lifecycle-crossfree-${{ matrix.cross_free }}
          path: ${{ runner.temp }}/artifacts-c-${{ matrix.cross_free }}

  rtinycc-r-unload:
    runs-on: windows-latest
    needs: [tinycc-c-lifecycle]

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install gdb (Rtools UCRT)
        shell: bash
        run: |
          set -euo pipefail
          if command -v gdb >/dev/null 2>&1; then
            gdb --version | head -n 1
          else
            /c/rtools45/usr/bin/pacman -Sy --noconfirm --needed mingw-w64-ucrt-x86_64-gdb
            echo 'C:/rtools45/ucrt64/bin' >> "$GITHUB_PATH"
            export PATH="/c/rtools45/ucrt64/bin:$PATH"
            gdb --version | head -n 1
          fi

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::tinytest, any::lambda.r
          needs: check

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          R CMD INSTALL --preclean --no-multiarch .

      - name: Enable local crash dumps (WER)
        shell: pwsh
        run: |
          $dumpDir = Join-Path $env:RUNNER_TEMP "dumps-r"
          New-Item -Path $dumpDir -ItemType Directory -Force | Out-Null
          New-Item -Path "HKCU:\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps" -Force | Out-Null
          New-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps" -Name "DumpFolder" -Value $dumpDir -PropertyType ExpandString -Force | Out-Null
          New-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps" -Name "DumpType" -Value 2 -PropertyType DWord -Force | Out-Null

      - name: Run unload stress script
        shell: bash
        run: |
          set -euo pipefail
          Rscript "$GITHUB_WORKSPACE/scripts/windows_r_unload_stress.R" 100 \
            2>&1 | tee "$RUNNER_TEMP/r-unload-direct.log"

      - name: Tinytest probe (plain)
        shell: bash
        run: |
          set -euo pipefail
          set +e
          Rscript "$GITHUB_WORKSPACE/scripts/windows_tinytest_shutdown_probe.R" plain \
            > "$RUNNER_TEMP/tinytest-probe-plain.log" 2>&1
          rc=$?
          echo "$rc" > "$RUNNER_TEMP/tinytest-probe-plain.exit"
          echo "tinytest-probe-plain exit code: $rc"
          set -e

      - name: Tinytest probe (flag shutdown)
        shell: bash
        run: |
          set -euo pipefail
          set +e
          Rscript "$GITHUB_WORKSPACE/scripts/windows_tinytest_shutdown_probe.R" flag_shutdown \
            > "$RUNNER_TEMP/tinytest-probe-flag.log" 2>&1
          rc=$?
          echo "$rc" > "$RUNNER_TEMP/tinytest-probe-flag.exit"
          echo "tinytest-probe-flag exit code: $rc"
          set -e

      - name: Run unload stress under gdb (if available)
        shell: bash
        run: |
          set -euo pipefail
          if command -v gdb >/dev/null 2>&1; then
            gdb --batch \
              -x "$GITHUB_WORKSPACE/scripts/windows_gdb_bt.txt" \
              --args Rscript "$GITHUB_WORKSPACE/scripts/windows_r_unload_stress.R" 100 \
              > "$RUNNER_TEMP/r-unload-gdb.log" 2>&1 || true
          else
            echo "gdb not found on PATH" > "$RUNNER_TEMP/r-unload-gdb.log"
          fi

      - name: Windows R CMD check smoke
        shell: bash
        run: |
          set -euo pipefail
          R CMD build .
          TAR_GZ="$(ls -1t *.tar.gz | head -n 1)"
          R CMD check --no-manual "$TAR_GZ" 2>&1 | tee "$RUNNER_TEMP/rcmdcheck.log"

      - name: Collect diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/artifacts-r"
          cp -f "$RUNNER_TEMP"/r-unload-*.log "$RUNNER_TEMP/artifacts-r" 2>/dev/null || true
          cp -f "$RUNNER_TEMP"/tinytest-probe-*.log "$RUNNER_TEMP/artifacts-r" 2>/dev/null || true
          cp -f "$RUNNER_TEMP"/tinytest-probe-*.exit "$RUNNER_TEMP/artifacts-r" 2>/dev/null || true
          cp -f "$RUNNER_TEMP"/rcmdcheck.log "$RUNNER_TEMP/artifacts-r" 2>/dev/null || true
          cp -rf ./*.Rcheck "$RUNNER_TEMP/artifacts-r" 2>/dev/null || true
          cp -f "$RUNNER_TEMP"/dumps-r/*.dmp "$RUNNER_TEMP/artifacts-r" 2>/dev/null || true
          git -C "$GITHUB_WORKSPACE" rev-parse HEAD > "$RUNNER_TEMP/artifacts-r/git-head.txt" 2>/dev/null || true
          (cd "$GITHUB_WORKSPACE" && find . -maxdepth 4 | sort) > "$RUNNER_TEMP/artifacts-r/workspace-tree.txt" 2>/dev/null || true
          mkdir -p "$RUNNER_TEMP/artifacts-r/workspace"
          cp -rf "$GITHUB_WORKSPACE"/.github "$RUNNER_TEMP/artifacts-r/workspace/" 2>/dev/null || true
          cp -rf "$GITHUB_WORKSPACE"/R "$RUNNER_TEMP/artifacts-r/workspace/" 2>/dev/null || true
          cp -rf "$GITHUB_WORKSPACE"/src "$RUNNER_TEMP/artifacts-r/workspace/" 2>/dev/null || true
          cp -rf "$GITHUB_WORKSPACE"/scripts "$RUNNER_TEMP/artifacts-r/workspace/" 2>/dev/null || true
          cp -rf "$GITHUB_WORKSPACE"/tools "$RUNNER_TEMP/artifacts-r/workspace/" 2>/dev/null || true
          cp -rf "$GITHUB_WORKSPACE"/inst/tinytest "$RUNNER_TEMP/artifacts-r/workspace/inst/" 2>/dev/null || true
          cp -f "$GITHUB_WORKSPACE"/DESCRIPTION "$RUNNER_TEMP/artifacts-r/workspace/" 2>/dev/null || true
          cp -f "$GITHUB_WORKSPACE"/configure.win "$RUNNER_TEMP/artifacts-r/workspace/" 2>/dev/null || true
          PKGROOT="$(Rscript -e 'cat(normalizePath(system.file(package = "Rtinycc"), winslash = "/", mustWork = TRUE))' 2>/dev/null || true)"
          if [ -n "${PKGROOT}" ] && [ -d "${PKGROOT}" ]; then
            cp -rf "${PKGROOT}" "$RUNNER_TEMP/artifacts-r/installed-Rtinycc"
          fi
          Rscript -e "sessionInfo()" > "$RUNNER_TEMP/artifacts-r/sessionInfo.txt" 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-r-unload-diagnostics
          path: ${{ runner.temp }}/artifacts-r
